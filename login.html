<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly Foods - Access Your Account</title>
    <meta name="description" content="Log in to your Stackly Foods account to manage bookings, orders, and recipes.">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="logo auth-logo" id="authLogo">
                <div class="logo-icon">
                    <i class="fas fa-bowl-food"></i>
                </div>
                <div class="logo-text">
                    <h2>STACKLY</h2>
                    <span>FOODS</span>
                </div>
            </a>
            <h2>Welcome Back</h2>
            <p>Please log in to manage your dining reservations</p>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
                <label for="login-email">Email Address *</label>
                <input type="email" id="login-email" placeholder="name@example.com" required autocomplete="email">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="login-password">Password *</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="login-role">Select Role *</label>
                <select id="login-role" required>
                    <option value="" disabled selected>-- Choose Your Role --</option>
                    <option value="customer">Customer</option>
                    <option value="chef">Chef</option>
                    <option value="admin">Administrator</option>
                </select>
                <span class="error-message"></span>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" id="remember-me"> Remember Me
                </label>
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>

            <button type="submit" class="primary-btn auth-btn" id="loginSubmitBtn">Log In</button>
        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <button type="button" class="google-btn" id="googleLoginBtn">
            <!-- Simple SVG for Google G Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.422-5.189l-6.161-5.207C29.352,35.191,26.793,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Continue with Google
        </button>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html" id="goToRegisterLink">Sign Up</a></p>
        </div>
    </div>

    <!-- Script -->
    <script src="js/script.js"></script>
</body>
</html>
