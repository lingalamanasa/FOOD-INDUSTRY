<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Stackly Foods - Create Your Account</title>
    <meta name="description" content="Sign up for a Stackly Foods account to book private dining events, register for classes, and manage reservations.">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="logo auth-logo" id="authLogo">
                <div class="logo-icon">
                    <i class="fas fa-bowl-food"></i>
                </div>
                <div class="logo-text">
                    <h2>STACKLY</h2>
                    <span>FOODS</span>
                </div>
            </a>
            <h2>Get Started</h2>
            <p>Create an account to join the Stackly Foods community</p>
        </div>

        <form class="auth-form" id="registerForm" novalidate>
            <div class="form-group">
                <label for="register-name">Full Name *</label>
                <input type="text" id="register-name" placeholder="John Doe" required autocomplete="name">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="register-email">Email Address *</label>
                <input type="email" id="register-email" placeholder="name@example.com" required autocomplete="email">
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="register-password">Password *</label>
                <input type="password" id="register-password" placeholder="Min. 6 characters" required autocomplete="new-password">
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
                <span class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="register-confirm-password">Confirm Password *</label>
                <input type="password" id="register-confirm-password" placeholder="••••••••" required autocomplete="new-password">
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
                <span class="error-message"></span>
            </div>

            <div class="terms-check">
                <input type="checkbox" id="terms-checkbox" required>
                <label for="terms-checkbox">I agree to the <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a> *</label>
            </div>

            <button type="submit" class="primary-btn auth-btn" id="registerSubmitBtn">Create Account</button>
        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <button type="button" class="google-btn" id="googleRegisterBtn">
            <!-- Simple SVG for Google G Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.422-5.189l-6.161-5.207C29.352,35.191,26.793,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Sign up with Google
        </button>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html" id="goToLoginLink">Log In</a></p>
        </div>
    </div>

    <!-- Script -->
    <script src="js/script.js"></script>
</body>
</html>
